name: Feature request
description: Suggest an idea or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. Please check the [Roadmap](https://github.com/928PJY/agent-pocket-daemon#roadmap) and [open issues](https://github.com/928PJY/agent-pocket-daemon/issues) first — your idea may already be in flight.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point in your own words. Avoid jumping straight to a solution.
      placeholder: When I'm coding from my phone, I want to ... but currently I can't because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have an idea for how to address it, describe it. It's fine to leave this blank if you just want to flag the problem.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this, and why you didn't pick them.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Where do you think the change lives?
      options:
        - Daemon (this repo)
        - iOS app
        - Relay server
        - Not sure
    validations:
      required: false
