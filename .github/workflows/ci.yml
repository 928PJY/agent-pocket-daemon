name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Coverage report
        if: matrix.node == '20'
        id: coverage
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee coverage.txt
          node scripts/coverage-to-markdown.mjs < coverage.txt > coverage.md
          cat coverage.md >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true

      - name: Comment coverage on PR
        if: matrix.node == '20' && github.event_name == 'pull_request' && steps.coverage.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: daemon-coverage
          path: coverage.md

      - name: Verify package contents
        if: matrix.node == '20'
        run: npm pack --dry-run
